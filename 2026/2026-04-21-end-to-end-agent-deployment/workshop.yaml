slug: end-to-end-agent-deployment
title: End-to-End Agent Deployment
description: |
  Build and deploy a production-ready agent that answers FAQ questions
  with streaming responses. We wire a FastAPI backend to the OpenAI
  Responses API, give the agent a tool-calling loop over an in-memory
  FAQ search index, stream tokens back over SSE, and ship the whole
  thing as a single container image.
